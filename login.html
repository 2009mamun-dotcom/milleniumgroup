<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learnix | Login</title>
    <style>
        body {
            background: radial-gradient(circle at top, #0a192f, #050a18);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            color: white;
            margin: 0;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-card h2 { color: #00d4ff; margin-bottom: 10px; }
        .login-card p { font-size: 0.9rem; color: #8892b0; margin-bottom: 30px; }

        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.8rem; margin-bottom: 5px; color: #ccd6f6; }
        .input-group input {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            outline: none;
        }
        .input-group input:focus { border-color: #00d4ff; }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, #00d4ff, #9d50bb);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-login:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(0, 212, 255, 0.3); }
        .back-home { display: block; margin-top: 20px; color: #8892b0; text-decoration: none; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Welcome Back</h2>
        <p>Login to your Learnix account</p>
        
        <form action="index.html">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" placeholder="student@example.com" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login">Login</button>
        </form>

        <a href="index.html" class="back-home">← Back to Home</a>
    </div>

</body>
</html>
