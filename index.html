<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learnix | Unleash Your Potential</title>
    <style>
        /* --- CSS Variables --- */
        :root {
            --navy-dark: #050a18;
            --navy-light: #0a192f;
            --accent-blue: #00d4ff;
            --accent-purple: #9d50bb;
            --text-white: #e6f1ff;
            --glass-bg: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--navy-dark); color: var(--text-white); scroll-behavior: smooth; overflow-x: hidden; }

        /* Navbar with Hamburger */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: rgba(5, 10, 24, 0.95);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 2000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo { font-size: 1.5rem; font-weight: bold; color: var(--accent-blue); letter-spacing: 1px; }

        .menu-icon {
            font-size: 1.8rem;
            cursor: pointer;
            color: var(--text-white);
            z-index: 3000;
        }

        .nav-menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 250px;
            height: 100vh;
            background: rgba(10, 25, 47, 0.98);
            display: flex;
            flex-direction: column;
            padding: 80px 30px;
            gap: 25px;
            transition: 0.4s ease-in-out;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }

        .nav-menu.active { right: 0; }

        .nav-menu a {
            text-decoration: none;
            color: var(--text-white);
            font-size: 1.1rem;
            font-weight: 500;
            transition: 0.3s;
        }

        .nav-menu a:hover { color: var(--accent-blue); padding-left: 10px; }

        .btn-login-nav {
            background: linear-gradient(45deg, var(--accent-blue), var(--accent-purple));
            border: none;
            color: white;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Hero & Dashboard Styles (Same as before) */
        .hero { height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; background: radial-gradient(circle at center, #112240 0%, #050a18 100%); }
        .hero-content h1 { font-size: 3.5rem; background: linear-gradient(to right, var(--accent-blue), var(--accent-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
        
        .dashboard { padding: 100px 5%; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .glass { background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 25px; transition: 0.3s; }
        .glass:hover { transform: translateY(-5px); border-color: var(--accent-blue); }
        
        .progress-bar { height: 10px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); border-radius: 10px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">LEARNIX</div>
        <div class="menu-icon" onclick="toggleMenu()">☰</div>
        <div class="nav-menu" id="navMenu">
            <a href="#hero" onclick="toggleMenu()">Home</a>
            <a href="#dashboard" onclick="toggleMenu()">Dashboard</a>
            <a href="resourcelibrary.html">Resources</a>
            <a href="login.html" class="btn-login-nav">Login / Sign Up</a>
        </div>
    </nav>

    <header class="hero" id="hero">
        <div class="hero-content">
            <h1>UNLEASH YOUR POTENTIAL</h1>
            <p>Your cosmic gateway to smart learning starts here.</p>
            <br>
            <a href="#dashboard" style="text-decoration:none; padding:15px 30px; background:var(--accent-blue); color:var(--navy-dark); border-radius:30px; font-weight:bold;">Explore Now</a>
        </div>
    </header>

    <section class="dashboard" id="dashboard">
        <h2 style="margin-bottom:30px;">Your Dashboard</h2>
        <div class="dashboard-grid">
            <a href="currentcourses.html" style="text-decoration:none; color:inherit;">
                <div class="glass">
                    <h3>📚 Courses</h3>
                    <div style="margin-top:15px; width:100%; background:rgba(255,255,255,0.1); border-radius:10px;">
                        <div class="progress-bar" style="width: 65%;"></div>
                    </div>
                </div>
            </a>
            <div class="glass" onclick="updateGoal()" style="cursor:pointer;">
                <h3>🎯 Daily Goal</h3>
                <p id="goalText" style="font-size:1.5rem; margin:10px 0; color:var(--accent-blue);">4 Hours</p>
                <small>Click to edit target</small>
            </div>
            </div>
    </section>

    <script>
        function toggleMenu() {
            document.getElementById('navMenu').classList.toggle('active');
        }

        function updateGoal() {
            const goal = prompt("নতুন টার্গেট সেট করুন (ঘণ্টা):", "4");
            if(goal) {
                localStorage.setItem('learnix_goal', goal);
                document.getElementById('goalText').innerText = goal + " Hours";
            }
        }

        window.onload = () => {
            const saved = localStorage.getItem('learnix_goal');
            if(saved) document.getElementById('goalText').innerText = saved + " Hours";
        }
    </script>
</body>
</html>
