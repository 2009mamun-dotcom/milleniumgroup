<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - HSC Assistant</title>
    <link rel="stylesheet" href="style.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC79M6Syp77yf2ftpL38FgBqH-mqAEWAx8",
            authDomain: "maxrika-aa386.firebaseapp.com",
            projectId: "maxrika-aa386",
            storageBucket: "maxrika-aa386.firebasestorage.app",
            messagingSenderId: "787890137415",
            appId: "1:787890137415:web:5f4aaa97ba103493f2c462",
            measurementId: "G-2NHQMLHXZM"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // প্রোটেকশন লজিক: লগইন না থাকলে বের করে দাও
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "login.html";
            } else {
                document.getElementById('user-email').innerText = user.email;
            }
        });

        // লগআউট ফাংশন
        window.logout = () => {
            signOut(auth).then(() => window.location.href = "login.html");
        };
    </script>
</head>
<body>
    <header>
        <h2>HSC Test Paper Tracker</h2>
        <div class="user-info">
            <span id="user-email"></span>
            <button onclick="logout()" class="logout-btn">Log Out</button>
        </div>
    </header>

    <div class="subject-container">
        <a href="physics2nd.html" class="card">
            <div class="icon">⚡</div>
            <h3>Physics 2nd Paper</h3>
            <p>বোর্ড প্রশ্ন ও সমাধান</p>
        </a>

        <a href="ict.html" class="card">
            <div class="icon">💻</div>
            <h3>ICT</h3>
            <p>অধ্যায় ভিত্তিক ট্র্যাকার</p>
        </a>

        <a href="#" class="card">
            <div class="icon">🧪</div>
            <h3>Chemistry</h3>
            <p>শিঘ্রই আসছে...</p>
        </a>
    </div>
</body>
</html>
