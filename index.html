<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Test Paper Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Smart Test Paper Assistant</h1>
        <p>HSC ২০২৬ প্রিপারেশন ট্র্যাকার</p>
    </header>

    <div class="container">
        <aside class="sidebar">
            <h3>অধ্যায় নির্বাচন করুন</h3>
            <select id="chapterFilter">
                <option value="all">সব অধ্যায়</option>
                <option value="logic-gate">লজিক গেট</option>
                <option value="networking">কমিউনিকেশন সিস্টেম</option>
            </select>
            
            <div class="stats">
                <p>সমাধান করেছেন: <span id="solvedCount">0</span></p>
            </div>
        </aside>

        <main class="question-area" id="questionArea">
            </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
