<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learnix | Smart Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --navy-dark: #050a18;
            --accent-blue: #00d4ff;
            --accent-purple: #9d50bb;
            --text-white: #e6f1ff;
            --glass-bg: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--navy-dark); color: var(--text-white); scroll-behavior: smooth; }

        /* Navbar */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 8%; background: rgba(5, 10, 24, 0.9); backdrop-filter: blur(15px);
            position: fixed; width: 100%; top: 0; z-index: 2000; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo-container { display: flex; align-items: center; gap: 10px; }
        .nav-logo-img { height: 35px; }
        .logo-text { font-size: 1.4rem; font-weight: bold; color: var(--accent-blue); letter-spacing: 1px; }

        /* Dashboard */
        .dashboard { padding: 120px 8% 50px; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
        
        .glass {
            background: var(--glass-bg); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 25px;
            padding: 35px; transition: 0.4s ease; height: 100%; position: relative;
        }
        .glass:hover { transform: translateY(-10px); border-color: var(--accent-blue); }

        /* Target Card Design */
        .target-info { margin-top: 20px; }
        .target-label { font-size: 0.85rem; color: #8892b0; margin-bottom: 5px; }
        .target-value { font-size: 2.2rem; font-weight: 800; color: var(--accent-blue); margin-bottom: 15px; }
        
        .progress-box { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .progress-container { background: rgba(0,0,0,0.3); height: 12px; border-radius: 10px; overflow: hidden; margin: 10px 0; }
        .progress-bar { 
            height: 100%; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); 
            width: 0%; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .progress-stats { display: flex; justify-content: space-between; font-size: 0.8rem; color: #cbd5e1; }

        .edit-badge {
            position: absolute; top: 20px; right: 20px; background: rgba(0, 212, 255, 0.1);
            color: var(--accent-blue); padding: 5px 12px; border-radius: 20px; font-size: 0.7rem; cursor: pointer;
        }

        /* SweetAlert Custom Style */
        .swal2-popup { background: #0a192f !important; color: white !important; border-radius: 20px !important; border: 1px solid var(--accent-blue) !important; }
        .swal2-title { color: var(--accent-blue) !important; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo-container">
            <img src="logo.png" alt="Learnix" class="nav-logo-img">
            <span class="logo-text">Learnix</span>
        </div>
        <div style="font-size: 1.5rem; cursor: pointer;">☰</div>
    </nav>

    <section class="dashboard">
        <h2 style="margin-bottom: 30px; font-weight: 700;">Greetings, Student! ✨</h2>
        
        <div class="dashboard-grid">
            <div class="glass" onclick="updateStudyData()" style="cursor: pointer;">
                <span class="edit-badge">Update Info ✎</span>
                <h3>🎯 Study Target</h3>
                
                <div class="target-info">
                    <p class="target-label">Target Study Time</p>
                    <div id="goalDisplay" class="target-value">0 Hours</div>
                    
                    <div class="progress-box">
                        <p class="target-label">Current Progress</p>
                        <div class="progress-container">
                            <div id="goalBar" class="progress-bar"></div>
                        </div>
                        <div class="progress-stats">
                            <span id="studiedDisplay">Done: 0h</span>
                            <span id="remainingDisplay">Left: 0h</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="glass">
                <h3>📚 Active Courses</h3>
                <p style="margin-top:15px; color:#8892b0;">Physics & ICT focus today.</p>
            </div>
        </div>
    </section>

    <script>
        function renderUI() {
            const goal = parseFloat(localStorage.getItem('lx_goal')) || 4;
            const studied = parseFloat(localStorage.getItem('lx_studied')) || 0;
            
            let percent = (studied / goal) * 100;
            if (percent > 100) percent = 100;

            document.getElementById('goalDisplay').innerText = goal + " Hours";
            document.getElementById('studiedDisplay').innerText = "পড়া হয়েছে: " + studied + "h";
            document.getElementById('remainingDisplay').innerText = "বাকি আছে: " + (goal - studied > 0 ? (goal - studied).toFixed(1) : 0) + "h";
            document.getElementById('goalBar').style.width = percent + "%";
        }

        async function updateStudyData() {
            const { value: formValues } = await Swal.fire({
                title: 'Daily Study Update',
                html:
                    '<label style="font-size:14px; color:#8892b0;">আজকে কতক্ষণ পড়ার ইচ্ছা আছে? (Target Hours)</label>' +
                    '<input id="swal-input1" class="swal2-input" type="number" placeholder="Hours" style="color:white; background:rgba(255,255,255,0.05);">' +
                    '<label style="font-size:14px; color:#8892b0;">এ পর্যন্ত কতক্ষণ পড়া শেষ করেছো? (Hours Done)</label>' +
                    '<input id="swal-input2" class="swal2-input" type="number" placeholder="Hours" style="color:white; background:rgba(255,255,255,0.05);">',
                focusConfirm: false,
                confirmButtonText: 'Update Now',
                confirmButtonColor: '#00d4ff',
                preConfirm: () => {
                    return [
                        document.getElementById('swal-input1').value,
                        document.getElementById('swal-input2').value
                    ]
                }
            });

            if (formValues) {
                const newGoal = formValues[0] || localStorage.getItem('lx_goal');
                const newStudied = formValues[1] || 0;

                localStorage.setItem('lx_goal', newGoal);
                localStorage.setItem('lx_studied', newStudied);
                
                renderUI();

                Swal.fire({
                    icon: 'success',
                    title: 'Excellent!',
                    text: 'তোমার ড্যাশবোর্ড আপডেট করা হয়েছে। অল দ্য বেস্ট!',
                    timer: 2000,
                    showConfirmButton: false
                });
            }
        }

        window.onload = renderUI;
    </script>
</body>
</html>
